name: publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 1.0.3)"
        required: true
        type: string
      beta:
        description: "Publish to the beta dist-tag (false = latest)"
        required: false
        default: true
        type: boolean

  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org

      # Manual runs use inputs; GitHub Release uses tag name (strip leading v) and prerelease → beta dist-tag.
      - name: Resolve publish version and dist-tag
        id: meta
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "beta=${{ inputs.beta }}" >> "$GITHUB_OUTPUT"
          else
            TAG="${{ github.event.release.tag_name }}"
            VERSION="${TAG#v}"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
            if [ "${{ github.event.release.prerelease }}" = "true" ]; then
              echo "beta=true" >> "$GITHUB_OUTPUT"
            else
              echo "beta=false" >> "$GITHUB_OUTPUT"
            fi
          fi
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}

      - run: npm ci
      # npm version exits 1 when the version is already set ("Version not changed").
      - name: Set package version
        run: |
          set -euo pipefail
          TARGET="${{ steps.meta.outputs.version }}"
          CURRENT="$(node -p "require('./package.json').version")"
          if [ "${CURRENT}" != "${TARGET}" ]; then
            npm version "${TARGET}" --no-git-tag-version
          else
            echo "package.json already at ${TARGET}; skipping npm version."
          fi
      - run: npm run lint
      - run: npm test
      # 401 here = missing/expired NPM_TOKEN, or token without registry access. Configure an npm access token as repo (or org) secret NPM_TOKEN.
      - name: Verify npm authentication
        run: |
          set -euo pipefail
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "::error::NPM_TOKEN is empty. Add an npm access token under Settings → Secrets and variables → Actions (name: NPM_TOKEN)."
            exit 1
          fi
          npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish to npm (beta)
        if: steps.meta.outputs.beta == 'true'
        run: npm publish --tag beta --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish to npm (latest)
        if: steps.meta.outputs.beta != 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
